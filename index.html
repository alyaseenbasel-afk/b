<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweetcream · Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#3D4B8A;--navy-dark:#2C3870;
  --cream:#FAF6EE;--border:#E5DDD0;--mid:#7A6E62;--dark:#1C1208;
  --green:#2E7D52;--red:#C0392B;--caramel:#C98B3A;
  --shadow:0 2px 14px rgba(61,75,138,0.10);--card-bg:#FFFFFF;
}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh}
header{background:var(--navy);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(61,75,138,0.3)}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.3)}
.logo-text{font-size:1.15rem;font-weight:800;color:#fff}
.logo-text span{display:block;font-size:0.7rem;font-weight:500;color:rgba(255,255,255,0.6);letter-spacing:0.05em;text-transform:uppercase}
#role-badge{font-size:0.7rem;padding:4px 12px;border-radius:20px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
.badge-owner{background:var(--caramel);color:#fff}
.badge-staff{background:rgba(255,255,255,0.15);color:#dde}
.badge-guest{background:rgba(0,0,0,0.2);color:#aaa}
.sign-out-btn{background:none;border:none;color:rgba(255,255,255,0.5);font-size:0.72rem;cursor:pointer;margin-left:10px;text-decoration:underline;font-family:'Nunito',sans-serif}
.sign-out-btn:hover{color:#fff}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:24px}
.login-card{background:var(--card-bg);border-radius:20px;padding:40px 32px;width:100%;max-width:360px;box-shadow:var(--shadow);text-align:center}
.login-logo{width:90px;height:90px;border-radius:50%;object-fit:cover;margin:0 auto 16px;display:block;border:3px solid var(--navy)}
.login-card h2{font-size:1.4rem;font-weight:800;margin-bottom:6px;color:var(--navy)}
.login-card p{color:var(--mid);font-size:0.875rem;margin-bottom:28px;line-height:1.5}
.role-btn{width:100%;padding:14px 16px;border-radius:12px;border:2px solid var(--border);background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;color:var(--dark);margin-bottom:10px;transition:all 0.2s;text-align:left;display:flex;align-items:center;gap:12px}
.role-btn:hover{border-color:var(--navy);background:#F0F2FA}
.rb-icon{font-size:1.4rem}.rb-sub{display:block;font-size:0.75rem;color:var(--mid);font-weight:500}
#pin-screen{display:none;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:24px}
.pin-card{background:var(--card-bg);border-radius:20px;padding:40px 32px;width:100%;max-width:340px;box-shadow:var(--shadow);text-align:center}
.pin-card h3{font-size:1.2rem;font-weight:800;color:var(--navy);margin-bottom:6px}
.pin-card p{color:var(--mid);font-size:0.85rem;margin-bottom:24px}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:background 0.15s}
.pin-dot.filled{background:var(--navy);border-color:var(--navy)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-key{padding:16px;border-radius:12px;border:1.5px solid var(--border);background:var(--cream);font-size:1.1rem;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:'Nunito',sans-serif}
.pin-key:hover{background:#E8EAF6;border-color:var(--navy)}
.pin-key.del{font-size:0.85rem;color:var(--mid)}.pin-key.empty{visibility:hidden}
#pin-error{color:var(--red);font-size:0.8rem;margin-top:12px;min-height:18px}
.back-link{display:inline-block;margin-top:14px;color:var(--mid);font-size:0.8rem;cursor:pointer;text-decoration:underline}
#app{display:none;padding:20px;max-width:960px;margin:0 auto}
.summary-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.summary-card{background:var(--card-bg);border-radius:14px;padding:14px 18px;flex:1;min-width:130px;box-shadow:var(--shadow)}
.summary-card .s-label{font-size:0.7rem;color:var(--mid);text-transform:uppercase;letter-spacing:0.07em;font-weight:700;margin-bottom:4px}
.summary-card .s-value{font-size:1.6rem;font-weight:800;color:var(--navy)}
.summary-card .s-sub{font-size:0.72rem;color:var(--mid);margin-top:1px}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:9px 18px;border-radius:10px;border:1.5px solid var(--border);background:transparent;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;color:var(--mid);transition:all 0.2s}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.tab-btn:hover:not(.active){border-color:var(--navy);color:var(--navy)}
.tab-panel{display:none}.tab-panel.active{display:block}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.section-title{font-size:1.1rem;font-weight:800;color:var(--navy)}
.section-title small{display:block;font-size:0.72rem;color:var(--mid);font-weight:500;margin-top:1px}
.add-item-card{background:var(--card-bg);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:var(--shadow);border-left:4px solid var(--navy)}
.add-item-card h3{font-size:0.9rem;font-weight:700;margin-bottom:14px;color:var(--navy)}
.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.form-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.form-field label{font-size:0.7rem;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:0.06em}
.form-field input,.form-field select,.form-field textarea{padding:9px 11px;border:1.5px solid var(--border);border-radius:9px;font-family:'Nunito',sans-serif;font-size:0.875rem;background:var(--cream);color:var(--dark);transition:border-color 0.2s;font-weight:600}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:none;border-color:var(--navy)}
textarea{resize:vertical;min-height:60px}
.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px}
.stock-card{background:var(--card-bg);border-radius:16px;padding:18px;box-shadow:var(--shadow);border:1.5px solid transparent;transition:border-color 0.2s}
.stock-card:hover{border-color:var(--border)}
.sc-emoji{font-size:1.8rem;margin-bottom:8px}.sc-name{font-weight:700;font-size:0.9rem;margin-bottom:3px}
.sc-qty{font-size:2rem;font-weight:800;line-height:1;margin-bottom:3px}
.qty-high{color:var(--green)}.qty-mid{color:var(--caramel)}.qty-low{color:var(--red)}
.sc-unit{font-size:0.72rem;color:var(--mid);margin-bottom:12px}
.qty-controls{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:var(--cream);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all 0.15s}
.qty-btn:hover{border-color:var(--navy);background:#E8EAF6}
.qty-input{width:54px;text-align:center;border:1.5px solid var(--border);border-radius:8px;padding:4px;font-size:0.9rem;font-family:'Nunito',sans-serif;font-weight:700;background:var(--cream)}
.btn{padding:9px 18px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-dark)}
.btn-green{background:var(--green);color:#fff}.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--dark)}.btn-outline:hover{border-color:var(--navy)}
.btn-sm{padding:6px 12px;font-size:0.78rem}
.order-form-card{background:var(--card-bg);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:var(--shadow);border-left:4px solid var(--caramel)}
.order-form-card h3{font-size:0.9rem;font-weight:700;margin-bottom:14px;color:var(--navy)}
.order-item-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.remove-item-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:1.1rem;padding:4px}
#add-order-item-btn{font-size:0.82rem;color:var(--navy);background:none;border:none;cursor:pointer;padding:4px 0;font-weight:700;font-family:'Nunito',sans-serif}
.orders-list{display:flex;flex-direction:column;gap:12px}
.order-card{background:var(--card-bg);border-radius:14px;padding:18px;box-shadow:var(--shadow);border-left:4px solid var(--border)}
.order-card.status-pending{border-left-color:var(--caramel)}
.order-card.status-fulfilled{border-left-color:var(--green)}
.order-card.status-cancelled{border-left-color:#aaa;opacity:0.65}
.order-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.order-id{font-weight:800;font-size:0.9rem;color:var(--navy)}
.order-date{font-size:0.75rem;color:var(--mid)}
.status-pill{font-size:0.68rem;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.06em}
.sp-pending{background:#FEF3CD;color:#8B6914}.sp-fulfilled{background:#D5F5E3;color:#1E8449}.sp-cancelled{background:#EAECEE;color:#666}
.order-customer{font-weight:700;font-size:0.9rem;margin-bottom:3px}
.order-details{font-size:0.78rem;color:var(--mid);line-height:1.7;margin-bottom:8px}
.order-items-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.item-tag{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:0.77rem;font-weight:600}
.order-actions{display:flex;gap:8px;flex-wrap:wrap}
.history-list{display:flex;flex-direction:column;gap:8px}
.hist-item{background:var(--card-bg);border-radius:10px;padding:11px 14px;display:flex;gap:12px;align-items:flex-start;box-shadow:var(--shadow)}
.hist-ts{font-size:0.7rem;color:var(--mid);white-space:nowrap;padding-top:2px}.hist-msg{font-size:0.82rem}
#toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:11px 18px;border-radius:12px;font-size:0.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.25);transform:translateY(80px);opacity:0;transition:all 0.3s;z-index:9999;max-width:300px}
#toast.show{transform:translateY(0);opacity:1}
.empty-state{text-align:center;padding:50px 20px;color:var(--mid)}
.empty-state .e-icon{font-size:2.2rem;margin-bottom:10px}
.empty-state p{font-size:0.875rem}
@media(max-width:600px){#app{padding:14px}.stock-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}}
</style>
</head>

      <h3>&#10133; Add / Edit Stock Item</h3>
      <div class="form-row">
        <div class="form-field"><label>Name</label><input type="text" id="ni-name" placeholder="e.g. Choc Chip Cookie"></div>
        <div class="form-field" style="max-width:80px"><label>Emoji</label><input type="text" id="ni-emoji" placeholder="&#127850;" maxlength="4"></div>
        <div class="form-field" style="max-width:90px"><label>Qty</label><input type="number" id="ni-qty" placeholder="0" min="0"></div>
        <div class="form-field" style="max-width:100px"><label>Unit</label><input type="text" id="ni-unit" placeholder="boxes"></div>
        <div class="form-field" style="max-width:110px"><label>Price (KWD)</label><input type="number" id="ni-price" placeholder="0.000" step="0.001" min="0"></div>
        <div style="display:flex;align-items:flex-end"><button class="btn btn-navy" onclick="saveItem()">Save</button></div>
      </div>
    </div>
    <div class="section-header">
      <div class="section-title">Live Stock <small id="stock-updated"></small></div>
    </div>
    <div class="stock-grid" id="stock-grid"><div class="empty-state"><div class="e-icon">&#128230;</div><p>No stock yet. Owner can add items above.</p></div></div>
  </div>

  <div class="tab-panel" id="tab-orders">
    <div class="order-form-card">
      <h3>&#128717; New Order</h3>
      <div class="form-row">
        <div class="form-field"><label>Customer Name</label><input type="text" id="oc-name" placeholder="Name"></div>
        <div class="form-field"><label>Phone</label><input type="tel" id="oc-phone" placeholder="+965 XXXX XXXX"></div>
      </div>
      <div class="form-row" style="margin-top:10px">
        <div class="form-field"><label>Date</label><input type="date" id="oc-date"></div>
        <div class="form-field" style="max-width:140px"><label>Time</label><input type="time" id="oc-time"></div>
        <div class="form-field"><label>Address / Area</label><input type="text" id="oc-address" placeholder="e.g. Salmiya, Block 12"></div>
      </div>
      <div style="margin-top:14px">
        <div style="font-size:0.7rem;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Order Items</div>
        <div id="order-items-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px"></div>
        <button id="add-order-item-btn" onclick="addOrderRow()">+ Add Item</button>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-field"><label>Notes</label><textarea id="oc-notes" placeholder="Special requests..."></textarea></div>
      </div>
      <div style="margin-top:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-navy" onclick="submitOrder()">Place Order</button>
        <span id="order-total" style="font-size:0.9rem;font-weight:700;color:var(--navy)"></span>
      </div>
    </div>
    <div class="section-header">
      <div class="section-title">All Orders <small id="orders-count"></small></div>
      <select id="order-filter" onchange="renderOrders()" style="padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.8rem;font-family:Nunito,sans-serif;font-weight:600;background:var(--cream)">
        <option value="all">All</option><option value="pending">Pending</option><option value="fulfilled">Fulfilled</option><option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div class="orders-list" id="orders-list"><div class="empty-state"><div class="e-icon">&#128203;</div><p>No orders yet.</p></div></div>
  </div>

  <div class="tab-panel" id="tab-history">
    <div class="section-header">
      <div class="section-title">Activity Log</div>
      <button class="btn btn-outline btn-sm" onclick="clearLog()">Clear</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG: Change these PINs before publishing ──
var CONFIG={OWNER_PIN:'1234',STAFF_PINS:['5678','9012','3456']};
// ────────────────────────────────────────────────
var state={role:null,selectedRole:null,pinBuffer:'',stock:[],orders:[],log:[]};
var rowCounter=0;

function loadData(){try{var s=localStorage.getItem('sc_stock');var o=localStorage.getItem('sc_orders');var l=localStorage.getItem('sc_log');if(s)state.stock=JSON.parse(s);if(o)state.orders=JSON.parse(o);if(l)state.log=JSON.parse(l)}catch(e){}}
function saveData(){try{localStorage.setItem('sc_stock',JSON.stringify(state.stock));localStorage.setItem('sc_orders',JSON.stringify(state.orders));localStorage.setItem('sc_log',JSON.stringify(state.log))}catch(e){}}
function addLog(msg){state.log.unshift({ts:new Date().toLocaleString('en-KW'),msg:msg});if(state.log.length>200)state.log=state.log.slice(0,200);saveData()}

function selectRole(r){state.selectedRole=r;document.getElementById('login-screen').style.display='none';var ps=document.getElementById('pin-screen');ps.style.display='flex';document.getElementById('pin-title').textContent=r==='owner'?'Owner PIN':'Staff PIN';state.pinBuffer='';updateDots();document.getElementById('pin-error').textContent=''}
function pinKey(k){if(k==='del')state.pinBuffer=state.pinBuffer.slice(0,-1);else if(state.pinBuffer.length<4)state.pinBuffer+=k;updateDots();if(state.pinBuffer.length===4)setTimeout(checkPin,150)}
function updateDots(){for(var i=0;i<4;i++)document.getElementById('dot-'+i).classList.toggle('filled',i<state.pinBuffer.length)}
function checkPin(){var p=state.pinBuffer;var ok=false;var role=null;if(state.selectedRole==='owner'&&p===CONFIG.OWNER_PIN){ok=true;role='owner'}else if(state.selectedRole==='staff'){for(var i=0;i<CONFIG.STAFF_PINS.length;i++){if(CONFIG.STAFF_PINS[i]===p){ok=true;role='staff';break}}}if(ok){state.role=role;document.getElementById('pin-screen').style.display='none';enterApp()}else{document.getElementById('pin-error').textContent='Wrong PIN. Try again.';state.pinBuffer='';updateDots()}}
function backToLogin(){document.getElementById('pin-screen').style.display='none';document.getElementById('login-screen').style.display='flex';state.pinBuffer=''}
function signOut(){state.role=null;document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('sign-out-btn').style.display='none';var b=document.getElementById('role-badge');b.textContent='Not signed in';b.className='badge-guest'}

function enterApp(){
  var b=document.getElementById('role-badge');
  b.textContent=state.role==='owner'?'Owner':'Staff';
  b.className=state.role==='owner'?'badge-owner':'badge-staff';
  document.getElementById('sign-out-btn').style.display='inline';
  // Both owner and staff can add/edit stock and orders
  // Owner also gets delete + log tab
  document.getElementById('add-item-section').style.display='';
  document.getElementById('log-tab-btn').style.display=state.role==='owner'?'':'none';
  document.getElementById('app').style.display='block';
  renderSummary();renderStock();renderOrders();renderLog();addOrderRow();
}

function switchTab(name,btn){
  var panels=document.querySelectorAll('.tab-panel');
  for(var i=0;i<panels.length;i++)panels[i].classList.remove('active');
  document.getElementById('tab-'+name).classList.add('active');
  var btns=document.querySelectorAll('.tab-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  if(btn)btn.classList.add('active');
  if(name==='history')renderLog();
}

function saveItem(){var name=document.getElementById('ni-name').value.trim();var emoji=document.getElementById('ni-emoji').value.trim()||'\u{1F36A}';var qty=parseInt(document.getElementById('ni-qty').value)||0;var unit=document.getElementById('ni-unit').value.trim()||'pcs';var price=parseFloat(document.getElementById('ni-price').value)||0;if(!name){showToast('Enter item name');return}var ex=state.stock.find(function(s){return s.name.toLowerCase()===name.toLowerCase()});if(ex){ex.emoji=emoji;ex.qty=qty;ex.unit=unit;ex.price=price;addLog('['+state.role+'] Updated: '+name+' qty='+qty)}else{state.stock.push({id:'i'+Date.now(),name:name,emoji:emoji,qty:qty,unit:unit,price:price});addLog('['+state.role+'] Added: '+name+' qty='+qty)}saveData();document.getElementById('ni-name').value='';document.getElementById('ni-qty').value='';renderStock();renderSummary();refreshOrderSelects();showToast('Saved: '+name)}

function adjustQty(id,delta){var it=state.stock.find(function(s){return s.id===id});if(!it)return;it.qty=Math.max(0,it.qty+delta);saveData();renderStock();renderSummary();addLog('['+state.role+'] '+it.name+' qty '+(delta>0?'+':'')+delta+' \u2192 '+it.qty)}
function setQty(id,val){var it=state.stock.find(function(s){return s.id===id});if(!it)return;it.qty=Math.max(0,parseInt(val)||0);saveData();renderSummary();addLog('['+state.role+'] '+it.name+' set to '+it.qty)}
function deleteItem(id){if(state.role!=='owner')return;var it=state.stock.find(function(s){return s.id===id});if(!it||!confirm('Remove '+it.name+'?'))return;state.stock=state.stock.filter(function(s){return s.id!==id});saveData();renderStock();renderSummary();showToast('Removed '+it.name)}

function renderStock(){var g=document.getElementById('stock-grid');if(!state.stock.length){g.innerHTML='<div class="empty-state"><div class="e-icon">&#128230;</div><p>No items yet.</p></div>';return}var h='';state.stock.forEach(function(it){var qc=it.qty>20?'qty-high':it.qty>5?'qty-mid':'qty-low';h+='<div class="stock-card"><div class="sc-emoji">'+it.emoji+'</div><div class="sc-name">'+esc(it.name)+'</div><div class="sc-qty '+qc+'">'+it.qty+'</div><div class="sc-unit">'+esc(it.unit)+(it.price?' &#183; '+it.price.toFixed(3)+' KWD':'')+'</div>';h+='<div class="qty-controls"><button class="qty-btn" onclick="adjustQty(\''+ it.id +'\',−1)">−</button><input class="qty-input" type="number" value="'+it.qty+'" min="0" onchange="setQty(\''+ it.id +'\',this.value)" onblur="renderStock()"><button class="qty-btn" onclick="adjustQty(\''+ it.id +'\',1)">+</button></div>';if(state.role==='owner')h+='<button class="btn btn-red btn-sm" style="margin-top:10px;width:100%" onclick="deleteItem(\''+ it.id +'\')" >&#128465; Remove</button>';h+='</div>'});g.innerHTML=h;document.getElementById('stock-updated').textContent='Updated '+new Date().toLocaleTimeString('en-KW',{hour:'2-digit',minute:'2-digit'})}

function addOrderRow(){rowCounter++;var id='r'+rowCounter;var list=document.getElementById('order-items-list');var row=document.createElement('div');row.className='order-item-row';row.id=id;var sel='<select class="ois" style="flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:9px;font-family:Nunito,sans-serif;font-size:0.85rem;background:var(--cream);font-weight:600" onchange="calcTotal()"><option value="">&#8212; Select item &#8212;</option>';state.stock.forEach(function(it){sel+='<option value="'+it.id+'">'+it.emoji+' '+esc(it.name)+' ('+it.qty+' left)</option>'});sel+='</select>';row.innerHTML=sel+'<input type="number" class="oiq" min="1" value="1" style="width:65px;padding:8px;border:1.5px solid var(--border);border-radius:9px;font-family:Nunito,sans-serif;font-size:0.85rem;background:var(--cream);font-weight:600" onchange="calcTotal()"><button class="remove-item-btn" onclick="document.getElementById(\''+ id +'\').remove();calcTotal()">&#10005;</button>';list.appendChild(row);calcTotal()}
function refreshOrderSelects(){var sels=document.querySelectorAll('.ois');sels.forEach(function(sel){var cur=sel.value;sel.innerHTML='<option value="">&#8212; Select item &#8212;</option>';state.stock.forEach(function(it){var o=document.createElement('option');o.value=it.id;o.textContent=it.emoji+' '+it.name+' ('+it.qty+' left)';if(it.id===cur)o.selected=true;sel.appendChild(o)})});calcTotal()}
function calcTotal(){var rows=document.querySelectorAll('.order-item-row');var t=0;rows.forEach(function(row){var sel=row.querySelector('.ois');var qty=parseInt(row.querySelector('.oiq').value)||0;if(sel&&sel.value){var it=state.stock.find(function(s){return s.id===sel.value});if(it&&it.price)t+=it.price*qty}});document.getElementById('order-total').textContent=t>0?'Total: '+t.toFixed(3)+' KWD':''}

function submitOrder(){var name=document.getElementById('oc-name').value.trim();var phone=document.getElementById('oc-phone').value.trim();var date=document.getElementById('oc-date').value;var time=document.getElementById('oc-time').value;var address=document.getElementById('oc-address').value.trim();var notes=document.getElementById('oc-notes').value.trim();if(!name){showToast('Enter customer name');return}if(!phone){showToast('Enter phone number');return}if(!date){showToast('Enter delivery date');return}if(!address){showToast('Enter address');return}var rows=document.querySelectorAll('.order-item-row');var items=[];var ok=true;rows.forEach(function(row){var sel=row.querySelector('.ois');var qty=parseInt(row.querySelector('.oiq').value)||0;if(sel&&sel.value&&qty>0){var it=state.stock.find(function(s){return s.id===sel.value});if(it&&qty>it.qty){showToast('Not enough stock: '+it.name+' (have '+it.qty+')');ok=false}if(sel.value)items.push({itemId:sel.value,qty:qty})}});if(!ok)return;if(!items.length){showToast('Add at least one item');return}items.forEach(function(oi){var it=state.stock.find(function(s){return s.id===oi.itemId});if(it)it.qty=Math.max(0,it.qty-oi.qty)});var oid='ORD-'+String(Date.now()).slice(-6);state.orders.unshift({id:oid,customer:name,phone:phone,date:date,time:time,address:address,items:items,notes:notes,status:'pending',createdAt:new Date().toISOString(),by:state.role});saveData();var names=items.map(function(oi){var it=state.stock.find(function(s){return s.id===oi.itemId});return(it?it.name:oi.itemId)+' x'+oi.qty}).join(', ');addLog('['+state.role+'] Order '+oid+': '+name+' \u2192 '+names);document.getElementById('oc-name').value='';document.getElementById('oc-phone').value='';document.getElementById('oc-date').value='';document.getElementById('oc-time').value='';document.getElementById('oc-address').value='';document.getElementById('oc-notes').value='';document.getElementById('order-items-list').innerHTML='';rowCounter=0;addOrderRow();renderStock();renderOrders();renderSummary();showToast('Order '+oid+' placed! Stock updated.')}

function updateOrderStatus(id,newSt,prevSt){var order=state.orders.find(function(o){return o.id===id});if(!order)return;if(prevSt==='pending'&&newSt==='cancelled'){order.items.forEach(function(oi){var it=state.stock.find(function(s){return s.id===oi.itemId});if(it)it.qty+=oi.qty});addLog('['+state.role+'] Cancelled '+id+' \u2013 stock restored')}if(prevSt==='cancelled'&&newSt==='pending'){var canR=true;order.items.forEach(function(oi){var it=state.stock.find(function(s){return s.id===oi.itemId});if(!it||it.qty<oi.qty)canR=false});if(!canR){showToast('Not enough stock to reactivate');return}order.items.forEach(function(oi){var it=state.stock.find(function(s){return s.id===oi.itemId});if(it)it.qty-=oi.qty});addLog('['+state.role+'] Reactivated '+id)}if(newSt==='fulfilled')addLog('['+state.role+'] Fulfilled '+id);order.status=newSt;saveData();renderOrders();renderStock();renderSummary();showToast(id+' \u2192 '+newSt)}
function deleteOrder(id){if(state.role!=='owner')return;if(!confirm('Delete this order?'))return;var order=state.orders.find(function(o){return o.id===id});if(order&&order.status==='pending')order.items.forEach(function(oi){var it=state.stock.find(function(s){return s.id===oi.itemId});if(it)it.qty+=oi.qty});state.orders=state.orders.filter(function(o){return o.id!==id});addLog('[Owner] Deleted '+id);saveData();renderOrders();renderStock();renderSummary();showToast('Deleted')}

function renderOrders(){var filter=document.getElementById('order-filter').value;var filtered=filter==='all'?state.orders:state.orders.filter(function(o){return o.status===filter});document.getElementById('orders-count').textContent=filtered.length+' order'+(filtered.length!==1?'s':'');var list=document.getElementById('orders-list');if(!filtered.length){list.innerHTML='<div class="empty-state"><div class="e-icon">&#128203;</div><p>No orders.</p></div>';return}var h='';filtered.forEach(function(order){var pills={pending:'sp-pending',fulfilled:'sp-fulfilled',cancelled:'sp-cancelled'};var itemsH=order.items.map(function(oi){var it=state.stock.find(function(s){return s.id===oi.itemId});return'<span class="item-tag">'+(it?it.emoji+' '+esc(it.name):oi.itemId)+' \u00d7'+oi.qty+'</span>'}).join('');var t=order.date+(order.time?' at '+order.time:'');h+='<div class="order-card status-'+order.status+'"><div class="order-meta"><span class="order-id">'+order.id+'</span><span class="status-pill '+pills[order.status]+'">'+order.status+'</span><span class="order-date">'+new Date(order.createdAt).toLocaleString('en-KW',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</span></div><div class="order-customer">'+esc(order.customer)+'</div><div class="order-details">&#128222; '+esc(order.phone)+' &nbsp;&#183; &#128205; '+esc(order.address)+' &nbsp;&#183; &#128197; '+esc(t)+(order.notes?'<br>&#128203; '+esc(order.notes):'')+'</div><div class="order-items-row">'+itemsH+'</div><div class="order-actions">';if(order.status==='pending'){h+='<button class="btn btn-green btn-sm" onclick="updateOrderStatus(\''+ order.id +'\',\'fulfilled\',\'pending\')">&#10003; Fulfilled</button><button class="btn btn-outline btn-sm" onclick="updateOrderStatus(\''+ order.id +'\',\'cancelled\',\'pending\')">&#10005; Cancel</button>'}if(order.status==='cancelled')h+='<button class="btn btn-outline btn-sm" onclick="updateOrderStatus(\''+ order.id +'\',\'pending\',\'cancelled\')">&#8629; Reactivate</button>';if(state.role==='owner')h+='<button class="btn btn-red btn-sm" onclick="deleteOrder(\''+ order.id +'\')" >&#128465; Delete</button>';h+='</div></div>'});list.innerHTML=h}

function renderSummary(){var total=state.stock.reduce(function(a,b){return a+b.qty},0);var pending=state.orders.filter(function(o){return o.status==='pending'}).length;var today=state.orders.filter(function(o){return o.date===new Date().toISOString().split('T')[0]}).length;document.getElementById('summary-row').innerHTML='<div class="summary-card"><div class="s-label">Items</div><div class="s-value">'+state.stock.length+'</div><div class="s-sub">'+total+' units</div></div><div class="summary-card"><div class="s-label">Pending</div><div class="s-value">'+pending+'</div><div class="s-sub">awaiting</div></div><div class="summary-card"><div class="s-label">Today</div><div class="s-value">'+today+'</div><div class="s-sub">deliveries</div></div><div class="summary-card"><div class="s-label">All Orders</div><div class="s-value">'+state.orders.length+'</div><div class="s-sub">all time</div></div>'}

function renderLog(){var l=document.getElementById('history-list');if(!state.log.length){l.innerHTML='<div class="empty-state"><div class="e-icon">&#128202;</div><p>No activity yet.</p></div>';return}l.innerHTML=state.log.map(function(e){return'<div class="hist-item"><span class="hist-ts">'+e.ts+'</span><span class="hist-msg">'+esc(e.msg)+'</span></div>'}).join('')}
function clearLog(){if(!confirm('Clear log?'))return;state.log=[];saveData();renderLog()}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}

loadData();
</script>
</body>
</html>
